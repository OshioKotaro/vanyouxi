<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🐉 AI跑团 · 多人回合制</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f0e 0%, #1a1f1e 100%);
            font-family: -apple-system, 'Segoe UI', 'Georgia', monospace;
            color: #e8e2d4;
            padding: 12px;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #c4a46e;
        }
        h1 { font-size: 1.5rem; margin: 0 0 15px 0; text-align: center; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 12px;
            padding: 6px 10px;
            background: #1a2a24;
            border-radius: 20px;
        }
        .sync-online { color: #8bc34a; }
        .sync-offline { color: #ff8a7a; }
        
        .panel {
            background: #0e1815cc;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; margin-bottom: 4px; color: #dbb86b; }
        input, select {
            width: 100%;
            background: #2c3b32;
            border: 1px solid #b48c48;
            padding: 10px 12px;
            border-radius: 40px;
            color: #f2e5c6;
            font-size: 14px;
        }
        button {
            background: #7e6236;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: #fff0d4;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }
        button:hover { background: #a47e42; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .room-code {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background: #1a2a24;
            padding: 12px;
            border-radius: 16px;
            letter-spacing: 4px;
            margin: 10px 0;
        }
        
        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .player-card {
            background: #2a3b2c;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .player-card.ready { background: #4a6b3c; border: 1px solid #8bc34a; }
        .player-card.host { border: 1px solid gold; }
        .ready-badge { font-size: 10px; color: #8bc34a; }
        
        .enemy-card {
            background: #2a221ab3;
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .combat-log {
            background: #030807;
            height: 300px;
            overflow-y: auto;
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
        }
        .combat-log p {
            margin: 6px 0;
            border-left: 3px solid #dba450;
            padding-left: 10px;
        }
        .ai-narration { color: #f7e6b0; font-style: italic; }
        .action-narration { color: #ffaa66; }
        .system-narration { color: #aaa; font-size: 11px; }
        
        .action-area {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        #actionInput { flex: 3; background: #1c2b25; border: 1px solid #c4a060; padding: 12px; border-radius: 60px; color: #f7efcf; }
        #actBtn { flex: 1; background: #9e6f3e; }
        
        .turn-indicator {
            background: #7e6236;
            padding: 8px;
            border-radius: 40px;
            text-align: center;
            font-size: 13px;
            margin-bottom: 12px;
        }
        
        .hidden { display: none; }
        
        hr { border-color: #5e6e45; margin: 15px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐉 AI跑团 · 多人回合制</h1>
    <div class="status-bar">
        <span id="syncStatus">🔄 连接中...</span>
        <span id="playerNameDisplay"></span>
    </div>
    
    <!-- 登录/创建角色界面 -->
    <div id="loginPanel" class="panel">
        <h3>✨ 创建冒险者</h3>
        <div class="form-group">
            <label>🧝 角色名</label>
            <input type="text" id="playerName" placeholder="输入你的名字">
        </div>
        <div class="form-group">
            <label>⚔️ 职业</label>
            <select id="playerClass">
                <option value="战士">🗡️ 战士 - 高血高攻</option>
                <option value="法师">🔮 法师 - 魔法攻击</option>
                <option value="游侠">🏹 游侠 - 精准射击</option>
            </select>
        </div>
        <button id="createPlayerBtn">✨ 创建角色</button>
        <hr>
        <h3>🔑 或恢复已有角色</h3>
        <div class="form-group">
            <label>🆔 角色ID</label>
            <input type="text" id="restoreId" placeholder="粘贴你的角色ID">
        </div>
        <button id="restorePlayerBtn">📀 恢复角色</button>
    </div>
    
    <!-- 房间界面 -->
    <div id="roomPanel" class="panel hidden">
        <h3>🏠 冒险者大厅</h3>
        <div id="roomInfo"></div>
        <div class="player-list" id="roomPlayerList"></div>
        <div id="roomActions"></div>
        <div class="form-group">
            <label>🔗 加入房间</label>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="joinRoomCode" placeholder="输入房间码">
                <button id="joinRoomBtn" style="width: auto;">加入</button>
            </div>
        </div>
    </div>
    
    <!-- 游戏界面 -->
    <div id="gamePanel" class="panel hidden">
        <div id="turnIndicator" class="turn-indicator">🎲 等待游戏开始...</div>
        <div id="sceneInfo">
            <div id="sceneName" style="font-size: 1.2rem; font-weight: bold;">加载中...</div>
            <div id="sceneDesc" style="font-size: 13px; opacity: 0.8;"></div>
        </div>
        <div id="enemyContainer"></div>
        <div id="playerStatsPanel" style="margin-top: 12px; background: #00000066; border-radius: 16px; padding: 10px;"></div>
        
        <div style="margin-top: 15px;">
            <div style="font-weight: bold;">📜 冒险记录</div>
            <div id="combatLog" class="combat-log"></div>
            <div class="action-area" id="actionArea">
                <input id="actionInput" placeholder="🔮 描述你的行动..." autocomplete="off">
                <button id="actBtn">🎲 行动</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== 配置 ==========
    const WORKER_URL = "https://paotuan.xianzhi-hong.workers.dev";
    const GROQ_API_KEY = "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";  // ← 填你的 Groq Key
    // =========================
    
    let currentPlayer = null;
    let currentRoom = null;
    let syncInterval = null;
    let myTurn = false;
    let gameActive = false;
    let displayedMessageIds = new Set();
    
    // 辅助函数
    function showPanel(panelName) {
        document.getElementById("loginPanel").classList.add("hidden");
        document.getElementById("roomPanel").classList.add("hidden");
        document.getElementById("gamePanel").classList.add("hidden");
        document.getElementById(panelName + "Panel").classList.remove("hidden");
    }
    
    function addLog(content, type = "system", playerName = null) {
        const logDiv = document.getElementById("combatLog");
        if (!logDiv) return;
        const p = document.createElement("p");
        const typeClass = type === "ai" ? "ai-narration" : (type === "action" ? "action-narration" : "system-narration");
        if (type === "ai") {
            p.innerHTML = `🎭 <span class="${typeClass}">✨ ${content}</span>`;
        } else if (type === "action") {
            p.innerHTML = `⚔️ <span class="${typeClass}">${content}</span>`;
        } else {
            p.innerHTML = `📢 <span class="${typeClass}">${content}</span>`;
        }
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: "smooth", block: "nearest" });
        
        // 同步到服务器
        sendMessage("addMessage", { type, playerName: playerName || currentPlayer?.name, content });
    }
    
    function systemMsg(msg) { addLog(msg, "system"); }
    
    async function sendMessage(action, data) {
        try {
            const response = await fetch(`${WORKER_URL}/action`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, data })
            });
            return await response.json();
        } catch(err) {
            console.error("发送失败:", err);
            return { success: false, error: err.message };
        }
    }
    
    // 创建角色
    document.getElementById("createPlayerBtn").onclick = async () => {
        const name = document.getElementById("playerName").value.trim();
        const playerClass = document.getElementById("playerClass").value;
        if (!name) { alert("请输入角色名"); return; }
        
        const result = await sendMessage("createPlayer", { name, class: playerClass });
        if (result.success) {
            currentPlayer = result.player;
            localStorage.setItem("playerId", result.playerId);
            document.getElementById("playerNameDisplay").innerHTML = `${currentPlayer.name} (${currentPlayer.class})`;
            systemMsg(`角色创建成功！你的ID: ${result.playerId.substring(0, 8)}...`);
            showPanel("room");
            loadRoomState();
        } else {
            alert("创建失败: " + result.error);
        }
    };
    
    // 恢复角色
    document.getElementById("restorePlayerBtn").onclick = async () => {
        const playerId = document.getElementById("restoreId").value.trim();
        if (!playerId) { alert("请输入角色ID"); return; }
        
        const result = await sendMessage("getPlayer", { playerId });
        if (result.success && result.player) {
            currentPlayer = result.player;
            localStorage.setItem("playerId", playerId);
            document.getElementById("playerNameDisplay").innerHTML = `${currentPlayer.name} (${currentPlayer.class})`;
            systemMsg(`欢迎回来，${currentPlayer.name}！`);
            showPanel("room");
            loadRoomState();
        } else {
            alert("角色不存在或已过期，请重新创建");
        }
    };
    
    // 创建房间
    async function createRoom() {
        const result = await sendMessage("createRoom", { roomName: `${currentPlayer.name}的房间`, playerId: currentPlayer.id });
        if (result.success) {
            currentRoom = result.room;
            await sendMessage("joinRoom", { roomId: currentRoom.id, playerId: currentPlayer.id });
            systemMsg(`房间创建成功！房间码: ${currentRoom.id}`);
            renderRoomUI();
        } else {
            alert("创建失败: " + result.error);
        }
    }
    
    // 加入房间
    async function joinRoom() {
        const roomCode = document.getElementById("joinRoomCode").value.trim().toUpperCase();
        if (!roomCode) return;
        const result = await sendMessage("joinRoom", { roomId: roomCode, playerId: currentPlayer.id });
        if (result.success) {
            currentRoom = result.room;
            systemMsg(`加入房间成功！`);
            renderRoomUI();
        } else {
            alert("加入失败: " + result.error);
        }
    }
    
    // 准备/取消准备
    async function toggleReady() {
        const newReady = !currentPlayer.isReady;
        await sendMessage("playerReady", { playerId: currentPlayer.id, isReady: newReady });
        currentPlayer.isReady = newReady;
        renderRoomUI();
    }
    
    // 开始游戏（房主）
    async function startGame() {
        const result = await sendMessage("startGame", { roomId: currentRoom.id, playerId: currentPlayer.id });
        if (result.success) {
            currentRoom = result.room;
            // 生成AI场景
            await generateAndSetScene();
        } else {
            alert("开始失败: " + result.error);
        }
    }
    
    // AI 生成场景
    async function generateAndSetScene() {
        systemMsg("🎲 AI 正在生成冒险场景...");
        const playerClasses = currentRoom.players.map(pid => {
            // 简化：需要从服务器获取玩家职业
            return currentPlayer.class;
        });
        const result = await sendMessage("generateScene", { 
            classes: [currentPlayer.class], 
            playerCount: currentRoom.players.length 
        });
        
        if (result.success && result.content) {
            const parts = result.content.split("|");
            const sceneDesc = parts[0];
            const enemies = [];
            for (let i = 1; i < parts.length; i++) {
                const e = parts[i].split(",");
                if (e.length >= 3) {
                    enemies.push({ name: e[0].trim(), hp: parseInt(e[1]), maxHp: parseInt(e[1]), ac: parseInt(e[2]) });
                }
            }
            if (enemies.length === 0) {
                enemies.push({ name: "👹 哥布林", hp: 40, maxHp: 40, ac: 11 });
            }
            
            await sendMessage("updateGame", { roomId: currentRoom.id, enemies, currentScene: sceneDesc });
            currentRoom.enemies = enemies;
            currentRoom.currentScene = sceneDesc;
            addLog(sceneDesc, "ai");
            addLog(`敌人出现: ${enemies.map(e => e.name).join(", ")}`, "action");
        } else {
            // 默认场景
            const defaultEnemies = [{ name: "👹 哥布林", hp: 40, maxHp: 40, ac: 11 }];
            await sendMessage("updateGame", { roomId: currentRoom.id, enemies: defaultEnemies, currentScene: "黑暗森林中，一只哥布林挡住了去路..." });
            currentRoom.enemies = defaultEnemies;
            addLog("黑暗森林中，一只哥布林挡住了去路...", "ai");
        }
        
        // 设置第一个玩家回合
        if (currentRoom.players.length > 0) {
            await sendMessage("updateGame", { roomId: currentRoom.id, turn: currentRoom.players[0] });
            currentRoom.turn = currentRoom.players[0];
        }
        gameActive = true;
        renderGameUI();
    }
    
    // 渲染房间界面
    function renderRoomUI() {
        if (!currentRoom) return;
        
        const isHost = currentRoom.hostId === currentPlayer.id;
        const allReady = currentRoom.players.length >= 1; // 简化：至少1人可开始
        
        document.getElementById("roomInfo").innerHTML = `
            <div class="room-code">🏠 房间码: ${currentRoom.id}</div>
            <div>状态: ${currentRoom.status === "waiting" ? "等待中" : "游戏中"}</div>
            <div>房主: ${isHost ? "你" : "其他玩家"}</div>
        `;
        
        // 玩家列表需要从服务器获取完整数据，简化处理
        document.getElementById("roomPlayerList").innerHTML = `
            <div class="player-card ${currentPlayer.isReady ? 'ready' : ''}">
                ${currentPlayer.name} (${currentPlayer.class}) ${currentPlayer.isReady ? '✓ 已准备' : '⭘ 未准备'}
                ${isHost ? ' 👑' : ''}
            </div>
        `;
        
        if (currentRoom.status === "waiting") {
            document.getElementById("roomActions").innerHTML = `
                <button id="readyBtn" style="margin-bottom: 10px;">${currentPlayer.isReady ? '取消准备' : '准备就绪'}</button>
                ${isHost ? `<button id="startGameBtn" ${!allReady ? 'disabled' : ''}>开始游戏</button>` : ''}
                <div style="font-size: 12px; margin-top: 10px; color: #aaa;">等待房主开始游戏...</div>
            `;
            document.getElementById("readyBtn")?.addEventListener("click", toggleReady);
            document.getElementById("startGameBtn")?.addEventListener("click", startGame);
        } else if (currentRoom.status === "playing") {
            document.getElementById("roomActions").innerHTML = `<div>游戏进行中...</div>`;
            showPanel("game");
            gameActive = true;
            renderGameUI();
        }
    }
    
    // 渲染游戏界面
    function renderGameUI() {
        if (!currentRoom) return;
        
        const myId = currentPlayer.id;
        myTurn = currentRoom.turn === myId;
        
        document.getElementById("turnIndicator").innerHTML = myTurn ? 
            "🎲 轮到你了！请行动" : 
            `⏳ 等待 ${currentRoom.turn === currentRoom.players[0] ? "其他玩家" : "AI"} 行动...`;
        document.getElementById("sceneName").innerHTML = currentRoom.currentScene?.split("，")[0] || "冒险开始";
        document.getElementById("sceneDesc").innerHTML = currentRoom.currentScene || "准备就绪...";
        
        // 敌人列表
        const enemyContainer = document.getElementById("enemyContainer");
        if (currentRoom.enemies && currentRoom.enemies.length > 0) {
            let html = "";
            currentRoom.enemies.forEach(e => {
                html += `<div class="enemy-card"><span>👾 ${e.name}</span><span>❤️ ${e.hp}/${e.maxHp}</span></div>`;
            });
            enemyContainer.innerHTML = html;
        } else {
            enemyContainer.innerHTML = "<div>✅ 所有敌人已被击败！</div>";
        }
        
        // 玩家状态
        document.getElementById("playerStatsPanel").innerHTML = `
            <div><strong>${currentPlayer.name}</strong> (${currentPlayer.class})</div>
            <div>❤️ ${currentPlayer.hp}/${currentPlayer.maxHp}  |  💙 MP ${currentPlayer.mp}/${currentPlayer.maxMp}</div>
            <div>⚔️ 攻击 +${currentPlayer.atkBonus}</div>
        `;
        
        document.getElementById("actionArea").style.display = myTurn && gameActive ? "flex" : "none";
    }
    
    // 执行行动
    async function takeAction() {
        if (!myTurn || !gameActive) { systemMsg("现在不是你的回合"); return; }
        if (!currentRoom.enemies || currentRoom.enemies.length === 0) { systemMsg("没有敌人了！"); return; }
        
        const actionText = document.getElementById("actionInput").value;
        if (!actionText) return;
        
        const btn = document.getElementById("actBtn");
        btn.disabled = true;
        btn.textContent = "⏳ 行动中...";
        
        try {
            const target = currentRoom.enemies[0];
            const dice = Math.floor(Math.random() * 20) + 1;
            const attackRoll = dice + currentPlayer.atkBonus;
            const isHit = attackRoll >= (target.ac || 11);
            let damage = 0;
            
            if (isHit) {
                damage = Math.floor(Math.random() * currentPlayer.baseDmg) + 5;
                target.hp -= damage;
            }
            
            // 更新敌人
            currentRoom.enemies = currentRoom.enemies.filter(e => e.hp > 0);
            await sendMessage("updateGame", { roomId: currentRoom.id, enemies: currentRoom.enemies });
            
            addLog(`${currentPlayer.name} 掷出 ${dice}+${currentPlayer.atkBonus}=${attackRoll}，${isHit ? "命中" : "未命中"}，伤害 ${damage}`, "action", currentPlayer.name);
            
            // 调用 AI 生成描述
            const prompt = `写一段30字的战斗描述：${currentPlayer.name}(${currentPlayer.class}) 使用 ${actionText} 攻击 ${target.name}，${isHit ? "命中造成" + damage + "点伤害" : "未命中"}`;
            try {
                const aiRes = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        messages: [{ role: "user", content: prompt }],
                        model: "llama-3.3-70b-versatile",
                        max_tokens: 100
                    })
                });
                const aiData = await aiRes.json();
                if (aiData.choices) {
                    addLog(aiData.choices[0].message.content, "ai", currentPlayer.name);
                }
            } catch(e) { console.log("AI失败"); }
            
            // 切换到下一个玩家
            const currentIndex = currentRoom.players.indexOf(currentRoom.turn);
            const nextIndex = (currentIndex + 1) % currentRoom.players.length;
            await sendMessage("updateGame", { roomId: currentRoom.id, turn: currentRoom.players[nextIndex] });
            currentRoom.turn = currentRoom.players[nextIndex];
            
            renderGameUI();
            
            if (currentRoom.enemies.length === 0) {
                addLog("🏆 战斗胜利！", "ai");
                gameActive = false;
            }
            
        } finally {
            btn.disabled = false;
            btn.textContent = "🎲 行动";
            document.getElementById("actionInput").value = "";
        }
    }
    
    // 同步状态
    async function syncState() {
        try {
            const response = await fetch(`${WORKER_URL}/state`);
            if (response.ok) {
                const data = await response.json();
                if (data.rooms && currentRoom?.id) {
                    const updatedRoom = data.rooms[currentRoom.id];
                    if (updatedRoom) {
                        const oldTurn = currentRoom?.turn;
                        currentRoom = updatedRoom;
                        if (currentRoom.status === "playing" && gameActive) {
                            if (oldTurn !== currentRoom.turn) {
                                renderGameUI();
                            }
                        }
                        if (currentRoom.status === "playing" && !gameActive) {
                            gameActive = true;
                            renderGameUI();
                        }
                    }
                }
                if (data.messages) {
                    for (const msg of data.messages.slice(-10)) {
                        if (!displayedMessageIds.has(msg.id)) {
                            displayedMessageIds.add(msg.id);
                            addLog(msg.content, msg.type, msg.playerName);
                        }
                    }
                }
            }
            document.getElementById("syncStatus").innerHTML = "🟢 已连接";
        } catch(err) {
            document.getElementById("syncStatus").innerHTML = "🔴 离线";
        }
    }
    
    async function loadRoomState() {
        const response = await fetch(`${WORKER_URL}/state`);
        if (response.ok) {
            const data = await response.json();
            for (const roomId in data.rooms) {
                if (data.rooms[roomId].players.includes(currentPlayer.id)) {
                    currentRoom = data.rooms[roomId];
                    break;
                }
            }
        }
        if (currentRoom) {
            if (currentRoom.status === "playing") {
                gameActive = true;
                showPanel("game");
                renderGameUI();
            } else {
                renderRoomUI();
            }
        } else {
            // 显示创建房间按钮
            document.getElementById("roomActions").innerHTML = `<button id="createRoomBtn">➕ 创建新房间</button>`;
            document.getElementById("createRoomBtn")?.addEventListener("click", createRoom);
            document.getElementById("roomPlayerList").innerHTML = "<div>暂无房间，点击上方按钮创建</div>";
        }
    }
    
    // 事件绑定
    document.getElementById("joinRoomBtn").onclick = joinRoom;
    document.getElementById("actBtn").onclick = takeAction;
    document.getElementById("actionInput").addEventListener("keypress", (e) => { if(e.key === "Enter") takeAction(); });
    
    // 自动同步
    syncInterval = setInterval(syncState, 2000);
    
    // 检查是否有保存的角色
    const savedId = localStorage.getItem("playerId");
    if (savedId) {
        document.getElementById("restoreId").value = savedId;
    }
    
    systemMsg("欢迎来到 AI 跑团！创建或恢复角色开始冒险。");
</script>
</body>
</html>
