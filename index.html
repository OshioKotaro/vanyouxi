<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🐉 AI跑团 · 修复版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f0e 0%, #1a1f1e 100%);
            font-family: -apple-system, 'Segoe UI', 'Georgia', monospace;
            color: #e8e2d4;
            padding: 12px;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 100%;
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #c4a46e;
        }
        h1 {
            font-size: 1.6rem;
            font-family: 'Georgia', serif;
            border-left: 5px solid #e6b873;
            padding-left: 15px;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .join-bar {
            background: #1f2a24;
            border-radius: 60px;
            padding: 12px 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-end;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .field label { font-size: 11px; letter-spacing: 2px; color: #dbb86b; }
        input, select {
            background: #2c3b32;
            border: 1px solid #b48c48;
            padding: 10px 12px;
            border-radius: 40px;
            color: #f2e5c6;
            font-family: monospace;
            font-size: 14px;
        }
        button {
            background: #7e6236;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: #fff0d4;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #a47e42; }
        button:disabled { opacity: 0.5; }
        .game-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .scene-box, .log-box {
            background: #0e1815cc;
            border-radius: 20px;
            padding: 15px;
        }
        .enemy-card {
            background: #2a221ab3;
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .combat-log {
            background: #030807;
            height: 400px;
            overflow-y: auto;
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
        }
        .combat-log p {
            margin: 8px 0;
            border-left: 3px solid #dba450;
            padding-left: 10px;
        }
        .ai-narration {
            color: #f7e6b0;
            font-style: italic;
            background: #1e2a1e30;
            padding: 5px;
            border-radius: 10px;
        }
        .action-area {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        #actionInput {
            flex: 3;
            background: #1c2b25;
            border: 1px solid #c4a060;
            padding: 12px;
            border-radius: 60px;
            color: #f7efcf;
            font-size: 14px;
        }
        #actBtn {
            flex: 1;
            background: #9e6f3e;
            font-size: 16px;
        }
        .players-tag {
            margin-top: 12px;
            font-size: 12px;
        }
        .badge {
            background: #2a3b2c;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            margin: 3px;
            font-size: 11px;
        }
        .status-ok { color: #8bc34a; font-size: 11px; }
        .status-warning { color: #ffc107; font-size: 11px; }
        #sceneName { font-size: 1.3rem; font-weight: bold; }
        #sceneDesc { font-size: 13px; opacity: 0.8; margin: 5px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐉 AI跑团 · 修复版</h1>
    <div id="apiStatus" style="text-align: right; font-size: 11px; margin-bottom: 8px;">🔍 检测中...</div>
    
    <div class="join-bar">
        <div class="field"><label>🧝 角色名</label><input type="text" id="playerName" value="冒险者"></div>
        <div class="field"><label>⚔️ 职业</label>
            <select id="playerClass">
                <option value="战士">🗡️ 战士</option>
                <option value="法师">🔮 法师</option>
                <option value="游侠">🏹 游侠</option>
            </select>
        </div>
        <button id="joinBtn">✨ 加入</button>
        <button id="statsBtn">📖 面板</button>
    </div>

    <div class="game-row">
        <div class="scene-box">
            <div id="sceneName">加载中...</div>
            <div id="sceneDesc"></div>
            <div id="enemyContainer"></div>
            <div id="playerStatsPanel" style="display: none; margin-top: 15px; background: #00000066; border-radius: 16px; padding: 10px;"></div>
            <div class="players-tag" id="playerListDiv">👥 冒险团：</div>
        </div>

        <div class="log-box">
            <div style="font-weight: bold;">📜 AI 口述史</div>
            <div id="combatLog" class="combat-log"></div>
            <div class="action-area">
                <input id="actionInput" placeholder="🔮 挥剑斩敌 / 火球术" autocomplete="off">
                <button id="actBtn">🎲 行动</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== ⚙️ 配置 ==========
    const WORKER_URL = "https://paotuan.xianzhi-hong.workers.dev";
    const OPENAI_API_KEY = "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";  // ← 改成你的Key
    // ==============================
    
    let gameWorld = {
        sceneName: "🕯️ 诅咒墓穴",
        sceneDesc: "石壁渗血，骷髅战士从棺椁中爬出。",
        enemies: [
            { id: "skull1", name: "💀 骷髅剑士", hp: 45, maxHp: 45, ac: 12 },
            { id: "skull2", name: "🏹 骷髅射手", hp: 32, maxHp: 32, ac: 11 }
        ]
    };
    
    let players = {};
    let currentPlayerId = null;
    let currentPlayer = null;
    let isActionLocked = false;
    
    function addLog(msg, isAI = false) {
        const logDiv = document.getElementById("combatLog");
        if (!logDiv) return;
        const p = document.createElement("p");
        if (isAI) {
            p.innerHTML = `🎭 <span class="ai-narration">✨ ${msg}</span>`;
        } else {
            p.innerHTML = `📢 ${msg}`;
        }
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
    
    function systemMsg(msg) { addLog(`[系统] ${msg}`, false); }
    function d20() { return Math.floor(Math.random() * 20) + 1; }
    function damageRoll(base) { return Math.floor(Math.random() * base) + 4; }
    
    function getClassAttrs(job) {
        if (job === "战士") return { hp: 110, maxHp: 110, mp: 20, atkBonus: 12, baseDmg: 10, skill: "破甲斩" };
        if (job === "法师") return { hp: 72, maxHp: 72, mp: 80, atkBonus: 6, baseDmg: 7, skill: "炎爆术" };
        if (job === "游侠") return { hp: 88, maxHp: 88, mp: 40, atkBonus: 10, baseDmg: 9, skill: "穿云箭" };
        return { hp: 85, maxHp: 85, mp: 35, atkBonus: 8, baseDmg: 8, skill: "攻击" };
    }
    
    function createPlayer(name, job) {
        const stats = getClassAttrs(job);
        const id = Date.now() + "-" + name + Math.random().toString(36).substr(2, 5);
        return {
            id, name, class: job,
            hp: stats.hp, maxHp: stats.maxHp,
            mp: stats.mp, maxMp: stats.mp,
            atkBonus: stats.atkBonus, baseDmg: stats.baseDmg,
            skillName: stats.skill
        };
    }
    
    function saveWorld() {
        try { localStorage.setItem("ai_rpg_world", JSON.stringify({ world: gameWorld, players })); } catch(e) {}
    }
    
    function loadWorld() {
        try {
            const raw = localStorage.getItem("ai_rpg_world");
            if (raw) {
                const data = JSON.parse(raw);
                if (data.world && data.world.enemies) gameWorld = data.world;
                if (data.players) players = data.players;
            }
        } catch(e) {}
        if (!gameWorld.enemies || gameWorld.enemies.length === 0) {
            gameWorld.enemies = [{ id: "goblin1", name: "👹 哥布林", hp: 40, maxHp: 40, ac: 11 }];
        }
        if (!gameWorld.sceneName) gameWorld.sceneName = "黑暗森林";
        if (!gameWorld.sceneDesc) gameWorld.sceneDesc = "阴森的树林...";
        renderUI();
        renderPlayers();
        if (currentPlayerId && players[currentPlayerId]) {
            currentPlayer = players[currentPlayerId];
            updateStatsPanel();
        }
    }
    
    function renderUI() {
        const sceneNameEl = document.getElementById("sceneName");
        const sceneDescEl = document.getElementById("sceneDesc");
        const enemyContainer = document.getElementById("enemyContainer");
        if (sceneNameEl) sceneNameEl.innerHTML = gameWorld.sceneName;
        if (sceneDescEl) sceneDescEl.innerHTML = gameWorld.sceneDesc;
        if (!enemyContainer) return;
        if (!gameWorld.enemies.length) {
            enemyContainer.innerHTML = "<div style='background:#28523b; border-radius: 20px; padding:12px;'>✅ 魔物已被击退！</div>";
            return;
        }
        let html = "";
        gameWorld.enemies.forEach(e => {
            html += `<div class="enemy-card"><span>👾 ${e.name}</span><span>❤️ ${e.hp}/${e.maxHp}</span><progress value="${e.hp}" max="${e.maxHp}" style="width:80px;"></progress></div>`;
        });
        enemyContainer.innerHTML = html;
    }
    
    function renderPlayers() {
        const div = document.getElementById("playerListDiv");
        if (!div) return;
        let names = Object.values(players).map(p => `<span class="badge">${p.name}(${p.class}) ❤️${p.hp}</span>`);
        if (names.length === 0) names = ["暂无旅伴"];
        div.innerHTML = `👥 冒险团： ${names.join(' ')}`;
    }
    
    function updateStatsPanel() {
        if (!currentPlayer) return;
        const panel = document.getElementById("playerStatsPanel");
        if (!panel) return;
        panel.style.display = "block";
        panel.innerHTML = `<div><strong>${currentPlayer.name}</strong> (${currentPlayer.class})</div>
            <div>❤️ ${currentPlayer.hp}/${currentPlayer.maxHp}  |  💙 MP ${currentPlayer.mp}/${currentPlayer.maxMp}</div>
            <div>⚔️ 攻击 +${currentPlayer.atkBonus}  |  🗡️ ${currentPlayer.skillName}</div>`;
    }
    
    // 🧠 修复后的AI调用 - 增加详细的错误日志
    async function callAI(character, actionDesc, dice, hitResult, damage, targetName) {
        const prompt = `写一段30-50字的战斗描述，黑暗奇幻风格：${character.name}(${character.class}) 使用 ${actionDesc} 攻击 ${targetName}，掷出${dice}点，${hitResult}，造成${damage}点伤害。`;
        
        console.log("🤖 发送请求到Worker:", WORKER_URL);
        
        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${OPENAI_API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini",
                    messages: [
                        { role: "system", content: "你是DND地下城主，擅长写简短的战斗描述。" },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.8,
                    max_tokens: 100
                })
            });
            
            console.log("响应状态:", response.status);
            
            if (!response.ok) {
                const errorText = await response.text();
                console.error("HTTP错误:", errorText);
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }
            
            const data = await response.json();
            console.log("完整响应数据:", data);
            
            // 尝试多种可能的数据格式
            let aiText = null;
            
            // 格式1: data.choices[0].message.content (标准OpenAI格式)
            if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
                aiText = data.choices[0].message.content;
                console.log("格式1成功");
            }
            // 格式2: data.content (简化格式)
            else if (data.content) {
                aiText = data.content;
                console.log("格式2成功");
            }
            // 格式3: data.response (另一种简化格式)
            else if (data.response) {
                aiText = data.response;
                console.log("格式3成功");
            }
            // 格式4: data (直接是字符串)
            else if (typeof data === "string") {
                aiText = data;
                console.log("格式4成功");
            }
            
            if (aiText) {
                return aiText.trim();
            } else {
                console.error("无法解析AI响应:", data);
                throw new Error("响应格式无法解析");
            }
            
        } catch(err) {
            console.error("AI调用失败:", err);
            // 返回生动的降级描述
            if (hitResult.includes("命中")) {
                return `⚔️ ${character.name} 的${actionDesc}划破空气，狠狠斩在${targetName}身上，造成${damage}点重创！血光四溅。`;
            } else {
                return `🍃 ${character.name} 的${actionDesc}被${targetName}灵巧地侧身闪避，只砍中了一片残影。`;
            }
        }
    }
    
    async function takeAction() {
        if (isActionLocked) { systemMsg("请等待上一个行动完成..."); return; }
        if (!currentPlayer) { systemMsg("请先点击「加入」创建角色！"); return; }
        if (currentPlayer.hp <= 0) { systemMsg("你已经倒下，请重新加入。"); return; }
        if (!gameWorld.enemies.length) { systemMsg("没有敌人了！"); return; }
        
        const actionText = document.getElementById("actionInput").value;
        if (!actionText) { systemMsg("请输入行动描述！"); return; }
        
        isActionLocked = true;
        const btn = document.getElementById("actBtn");
        const originalBtnText = btn.textContent;
        btn.textContent = "⏳ AI思考中...";
        btn.disabled = true;
        
        try {
            const target = gameWorld.enemies[0];
            const dice = d20();
            const attackRoll = dice + currentPlayer.atkBonus;
            const targetAC = target.ac || 11;
            const isHit = attackRoll >= targetAC;
            
            let damage = 0;
            let hitText = "";
            
            if (isHit) {
                damage = damageRoll(currentPlayer.baseDmg) + Math.floor(currentPlayer.atkBonus / 3);
                damage = Math.max(2, damage);
                target.hp -= damage;
                hitText = "命中";
            } else {
                hitText = "未命中";
                damage = 0;
            }
            
            // 更新数据
            players[currentPlayer.id] = currentPlayer;
            gameWorld.enemies = gameWorld.enemies.filter(e => e.hp > 0);
            
            // 添加战斗日志
            addLog(`🎲 掷出 ${dice} + ${currentPlayer.atkBonus} = ${attackRoll} vs AC${targetAC} → ${isHit ? "命中" : "未命中"}，伤害 ${damage}`, false);
            
            // 调用AI
            const aiDescription = await callAI(currentPlayer, actionText, dice, hitText, damage, target.name);
            addLog(aiDescription, true);
            
            // 刷新界面
            renderUI();
            updateStatsPanel();
            renderPlayers();
            saveWorld();
            
            // 检查胜利
            if (gameWorld.enemies.length === 0) {
                addLog("🏆 战斗胜利！冒险者们获得了丰厚的战利品。", true);
            }
            
            // 检查玩家死亡
            if (currentPlayer.hp <= 0) {
                systemMsg(`💀 ${currentPlayer.name} 力竭而亡...`);
                delete players[currentPlayer.id];
                currentPlayer = null;
                currentPlayerId = null;
                document.getElementById("playerStatsPanel").style.display = "none";
                renderPlayers();
                saveWorld();
            }
            
        } catch(err) {
            console.error("行动执行错误:", err);
            systemMsg(`错误: ${err.message}`);
        } finally {
            isActionLocked = false;
            btn.textContent = originalBtnText;
            btn.disabled = false;
            document.getElementById("actionInput").value = "";
        }
    }
    
    function joinGame() {
        let name = document.getElementById("playerName").value.trim();
        if (!name) name = "冒险者";
        const job = document.getElementById("playerClass").value;
        const newPlayer = createPlayer(name, job);
        players[newPlayer.id] = newPlayer;
        currentPlayerId = newPlayer.id;
        currentPlayer = newPlayer;
        updateStatsPanel();
        renderPlayers();
        saveWorld();
        systemMsg(`${newPlayer.name} (${newPlayer.class}) 加入了冒险团！`);
        addLog(`✨ ${newPlayer.name} 从迷雾中走来，握紧了武器。`, true);
    }
    
    function toggleStats() {
        const panel = document.getElementById("playerStatsPanel");
        if (currentPlayer) {
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        } else {
            systemMsg("请先加入游戏");
        }
    }
    
    // 测试Worker连接
    async function testWorker() {
        const statusDiv = document.getElementById("apiStatus");
        statusDiv.innerHTML = "🔄 测试Worker连接...";
        
        try {
            const response = await fetch(WORKER_URL, { method: "HEAD" });
            if (response.ok || response.status === 405 || response.status === 204) {
                statusDiv.innerHTML = "✅ Worker已连接，AI模式就绪";
                statusDiv.className = "status-ok";
            } else {
                statusDiv.innerHTML = `⚠️ Worker响应: ${response.status}`;
                statusDiv.className = "status-warning";
            }
        } catch(err) {
            statusDiv.innerHTML = `⚠️ 请确保Worker地址正确`;
            statusDiv.className = "status-warning";
            console.error("Worker测试失败:", err);
        }
    }
    
    // 绑定事件
    document.getElementById("joinBtn").onclick = joinGame;
    document.getElementById("statsBtn").onclick = toggleStats;
    document.getElementById("actBtn").onclick = takeAction;
    document.getElementById("actionInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") takeAction();
    });
    
    // 初始化
    loadWorld();
    testWorker();
    addLog("🔥 AI跑团已启动！每次行动都会调用GPT生成描述。", true);
    addLog("💡 打开F12控制台可以看到详细的调用日志。", false);
</script>
</body>
</html>
