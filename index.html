<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🐉 AI跑团 · 稳定剧情版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f0e 0%, #1a1f1e 100%);
            font-family: -apple-system, monospace;
            color: #e8e2d4;
            padding: 12px;
            margin: 0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #c4a46e;
        }
        h1 { font-size: 1.3rem; margin: 0 0 12px 0; text-align: center; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 12px;
            padding: 5px 10px;
            background: #1a2a24;
            border-radius: 20px;
        }
        .panel {
            background: #0e1815cc;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; margin-bottom: 4px; color: #dbb86b; }
        input, select {
            width: 100%;
            background: #2c3b32;
            border: 1px solid #b48c48;
            padding: 10px;
            border-radius: 40px;
            color: #f2e5c6;
            font-size: 14px;
        }
        button {
            background: #7e6236;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            color: #fff0d4;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            transition: opacity 0.2s;
        }
        button:hover { background: #a47e42; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .room-code {
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            background: #1a2a24;
            padding: 10px;
            border-radius: 16px;
            margin: 10px 0;
            letter-spacing: 2px;
        }
        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
            min-height: 60px;
        }
        .player-card {
            background: #2a3b2c;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 12px;
        }
        .player-card.ready { background: #4a6b3c; border: 1px solid #8bc34a; }
        .player-card.host { border: 1px solid gold; }
        .enemy-card {
            background: #2a221ab3;
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
        }
        .combat-log {
            background: #030807;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 16px;
            font-size: 12px;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .combat-log p {
            margin: 5px 0;
            border-left: 2px solid #dba450;
            padding-left: 8px;
        }
        .ai-text { color: #f7e6b0; font-style: italic; }
        .action-text { color: #ffaa66; }
        .system-text { color: #aaa; font-size: 11px; }
        .action-area {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        #actionInput {
            flex: 3;
            background: #1c2b25;
            border: 1px solid #c4a060;
            padding: 10px;
            border-radius: 40px;
            color: #f7efcf;
        }
        #actBtn { flex: 1; background: #9e6f3e; }
        .turn-indicator {
            background: #7e6236;
            padding: 8px;
            border-radius: 40px;
            text-align: center;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .hidden { display: none; }
        hr { border-color: #5e6e45; margin: 12px 0; }
        .flex-row { display: flex; gap: 8px; }
        .flex-row button { width: auto; }
        .info-text { font-size: 12px; color: #aaa; margin-top: 5px; text-align: center; }
        .attr-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
        .attr-name { width: 60px; }
        .attr-value { width: 40px; text-align: center; }
        .attr-buttons { display: flex; gap: 5px; }
        .attr-buttons button { width: 30px; padding: 2px; }
        .points-left { font-weight: bold; color: gold; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐉 AI跑团 · 稳定剧情版</h1>
    <div class="status-bar">
        <span id="syncStatus">🔄 连接中...</span>
        <span id="playerNameDisplay"></span>
    </div>
    
    <div id="loginPanel" class="panel">
        <h3>✨ 创建新角色</h3>
        <div class="form-group">
            <label>角色名</label>
            <input type="text" id="playerName" placeholder="输入名字" value="冒险者">
        </div>
        <div class="form-group">
            <label>职业</label>
            <select id="playerClass">
                <option value="战士">🗡️ 战士</option>
                <option value="法师">🔮 法师</option>
                <option value="游侠">🏹 游侠</option>
            </select>
        </div>
        <div id="attributePanel" style="margin-top: 12px;">
            <div style="font-size: 14px; margin-bottom: 8px;">📊 分配属性点（剩余 <span id="pointsLeft" class="points-left">20</span> 点）</div>
            <div class="attr-row"><span class="attr-name">💪 力量</span><span id="strVal" class="attr-value">10</span><div class="attr-buttons"><button data-attr="str" data-delta="1">+</button><button data-attr="str" data-delta="-1">-</button></div><span class="info-text">（影响攻击力）</span></div>
            <div class="attr-row"><span class="attr-name">🏹 敏捷</span><span id="dexVal" class="attr-value">10</span><div class="attr-buttons"><button data-attr="dex" data-delta="1">+</button><button data-attr="dex" data-delta="-1">-</button></div><span class="info-text">（影响闪避）</span></div>
            <div class="attr-row"><span class="attr-name">🧠 智力</span><span id="intVal" class="attr-value">10</span><div class="attr-buttons"><button data-attr="int" data-delta="1">+</button><button data-attr="int" data-delta="-1">-</button></div><span class="info-text">（影响法术）</span></div>
            <div class="attr-row"><span class="attr-name">❤️ 体质</span><span id="conVal" class="attr-value">10</span><div class="attr-buttons"><button data-attr="con" data-delta="1">+</button><button data-attr="con" data-delta="-1">-</button></div><span class="info-text">（影响生命）</span></div>
        </div>
        <button id="createPlayerBtn" style="margin-top: 12px;">创建并进入大厅</button>
        <hr>
        <h3>🔑 恢复已有角色</h3>
        <div class="form-group">
            <label>角色ID</label>
            <input type="text" id="restoreId" placeholder="粘贴你的角色ID">
            <button id="restoreBtn" style="margin-top: 8px;">恢复角色</button>
        </div>
    </div>
    
    <div id="roomPanel" class="panel hidden">
        <div id="roomInfo"></div>
        <div class="player-list" id="roomPlayerList"></div>
        <div id="roomActions"></div>
        <hr>
        <div class="flex-row">
            <input type="text" id="joinRoomCode" placeholder="输入房间码">
            <button id="joinRoomBtn" style="width: auto;">加入</button>
        </div>
    </div>
    
    <div id="gamePanel" class="panel hidden">
        <div id="turnIndicator" class="turn-indicator">等待开始...</div>
        <div id="sceneDesc" style="font-size: 13px; margin-bottom: 10px;"></div>
        <div id="enemyContainer"></div>
        <div id="playerStats" style="margin-top: 10px; background: #00000066; border-radius: 16px; padding: 8px; font-size: 12px;"></div>
        <div style="margin-top: 12px;">
            <div>📜 冒险记录</div>
            <div id="combatLog" class="combat-log"></div>
            <div class="action-area" id="actionArea">
                <input id="actionInput" placeholder="描述行动... (攻击/探索/对话/使用技能)" autocomplete="off">
                <button id="actBtn">行动</button>
            </div>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://paotuan.xianzhi-hong.workers.dev";
    // 不再需要前端的 API Key，全部由 Worker 环境变量处理
    
    let currentPlayer = null;
    let currentRoom = null;
    let syncInterval = null;
    let gameActive = false;
    let lastMessageId = 0;
    let isActing = false;
    let displayedMessageIds = new Set();
    
    let pendingAttributes = { str: 10, dex: 10, int: 10, con: 10 };
    let pointsLeft = 20;
    
    function updateAttributeUI() {
        document.getElementById("strVal").innerText = pendingAttributes.str;
        document.getElementById("dexVal").innerText = pendingAttributes.dex;
        document.getElementById("intVal").innerText = pendingAttributes.int;
        document.getElementById("conVal").innerText = pendingAttributes.con;
        document.getElementById("pointsLeft").innerText = pointsLeft;
        document.querySelectorAll("[data-delta='1']").forEach(btn => btn.disabled = pointsLeft === 0);
        document.querySelectorAll("[data-delta='-1']").forEach(btn => {
            const attr = btn.getAttribute("data-attr");
            btn.disabled = pendingAttributes[attr] === 10;
        });
    }
    
    function initAttributeControls() {
        document.querySelectorAll("[data-delta]").forEach(btn => {
            btn.addEventListener("click", () => {
                const attr = btn.getAttribute("data-attr");
                const delta = parseInt(btn.getAttribute("data-delta"));
                if (delta === 1 && pointsLeft === 0) return;
                if (delta === -1 && pendingAttributes[attr] === 10) return;
                pendingAttributes[attr] += delta;
                pointsLeft -= delta;
                updateAttributeUI();
            });
        });
        updateAttributeUI();
    }
    
    function showPanel(name) {
        document.getElementById("loginPanel").classList.add("hidden");
        document.getElementById("roomPanel").classList.add("hidden");
        document.getElementById("gamePanel").classList.add("hidden");
        document.getElementById(name + "Panel").classList.remove("hidden");
    }
    
    function clearLog() {
        const logDiv = document.getElementById("combatLog");
        if (logDiv) logDiv.innerHTML = "";
        displayedMessageIds.clear();
        lastMessageId = 0;
    }
    
    function generateClientId() {
        return Date.now() + "-" + Math.random().toString(36).substring(2, 8);
    }
    
    function addLog(content, type = "system", skipSync = false, clientId = null) {
        const logDiv = document.getElementById("combatLog");
        if (!logDiv) return;
        if (clientId && displayedMessageIds.has(clientId)) return;
        if (clientId) displayedMessageIds.add(clientId);
        const p = document.createElement("p");
        const cls = type === "ai" ? "ai-text" : (type === "action" ? "action-text" : "system-text");
        p.innerHTML = `<span class="${cls}">${content}</span>`;
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: "smooth", block: "nearest" });
        while (logDiv.children.length > 200) logDiv.removeChild(logDiv.firstChild);
        if (!skipSync && currentPlayer && currentPlayer.roomId) {
            const cid = clientId || generateClientId();
            if (!clientId) displayedMessageIds.add(cid);
            api("addMessage", { 
                type, 
                playerName: currentPlayer.name, 
                content, 
                roomId: currentPlayer.roomId,
                clientId: cid
            });
        }
    }
    
    async function api(action, data) {
        try {
            const res = await fetch(`${WORKER_URL}/action`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, data })
            });
            return await res.json();
        } catch(e) {
            console.error("API错误:", e);
            return { success: false, error: e.message };
        }
    }
    
    // 获取日志历史
    function getLogHistory() {
        const logDiv = document.getElementById("combatLog");
        if (!logDiv) return [];
        const logEntries = Array.from(logDiv.querySelectorAll("p")).slice(-20);
        return logEntries.map(p => {
            const text = p.innerText;
            const isAi = p.querySelector(".ai-text") !== null;
            const isAction = p.querySelector(".action-text") !== null;
            let type = "system";
            if (isAi) type = "ai";
            else if (isAction) type = "action";
            return { type, playerName: null, content: text };
        });
    }
    
    async function generateNarrative(prompt) {
        const history = getLogHistory();
        try {
            const res = await fetch(`${WORKER_URL}/action`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action: "generateNarrative", data: { prompt, history } })
            });
            const result = await res.json();
            if (result.success) return result.text;
            console.warn("AI返回失败:", result);
            return "你环顾四周，没有发现异常。";
        } catch(e) {
            console.error("生成剧情失败:", e);
            return "你环顾四周，没有发现异常。";
        }
    }
    
    async function resetRoomState() {
        clearLog();
        if (currentPlayer && currentPlayer.roomId) {
            try {
                const res = await fetch(`${WORKER_URL}/state?roomId=${currentPlayer.roomId}`);
                const data = await res.json();
                if (data.messages && data.messages.length) {
                    for (let msg of data.messages) {
                        if (msg.clientId) displayedMessageIds.add(msg.clientId);
                    }
                    const maxId = Math.max(...data.messages.map(m => m.id), 0);
                    lastMessageId = maxId;
                }
            } catch(e) { console.warn(e); }
        }
    }
    
    document.getElementById("createPlayerBtn").onclick = async () => {
        const name = document.getElementById("playerName").value.trim();
        const cls = document.getElementById("playerClass").value;
        if (!name) { alert("请输入名字"); return; }
        const attributes = { ...pendingAttributes };
        const res = await api("createPlayer", { name, class: cls, attributes });
        if (res.success) {
            currentPlayer = res.player;
            localStorage.setItem("playerId", currentPlayer.id);
            document.getElementById("playerNameDisplay").innerHTML = `${currentPlayer.name} (${currentPlayer.class})`;
            addLog(`欢迎，${currentPlayer.name}！`, "system", true);
            showPanel("room");
            await refreshState();
        } else {
            alert("创建失败");
        }
    };
    
    document.getElementById("restoreBtn").onclick = async () => {
        const id = document.getElementById("restoreId").value.trim();
        if (!id) { alert("请输入角色ID"); return; }
        const res = await api("getPlayer", { playerId: id });
        if (res.success && res.player) {
            currentPlayer = res.player;
            localStorage.setItem("playerId", currentPlayer.id);
            document.getElementById("playerNameDisplay").innerHTML = `${currentPlayer.name} (${currentPlayer.class})`;
            addLog(`欢迎回来，${currentPlayer.name}！`, "system", true);
            showPanel("room");
            await refreshState();
        } else {
            alert("角色不存在或已过期");
        }
    };
    
    async function refreshState() {
        if (!currentPlayer) return;
        const url = `${WORKER_URL}/state${currentPlayer.roomId ? `?roomId=${currentPlayer.roomId}` : ""}`;
        const res = await fetch(url);
        const data = await res.json();
        if (currentPlayer && data.players[currentPlayer.id]) {
            currentPlayer = data.players[currentPlayer.id];
            document.getElementById("playerNameDisplay").innerHTML = `${currentPlayer.name} (${currentPlayer.class})`;
        }
        if (currentPlayer && currentPlayer.roomId && data.rooms[currentPlayer.roomId]) {
            currentRoom = data.rooms[currentPlayer.roomId];
            if (currentRoom.status === "playing") {
                if (!gameActive) {
                    gameActive = true;
                    showPanel("game");
                    clearLog();
                    if (currentRoom.currentScene) {
                        addLog(currentRoom.currentScene, "ai", true);
                    }
                }
                renderGameUI();
            } else if (currentRoom.status === "waiting") {
                renderRoomUI();
            }
        } else {
            document.getElementById("roomInfo").innerHTML = "<div>暂无房间</div>";
            document.getElementById("roomPlayerList").innerHTML = "";
            document.getElementById("roomActions").innerHTML = `<button id="createRoomBtn">➕ 创建新房间</button>`;
            document.getElementById("createRoomBtn")?.addEventListener("click", createRoom);
        }
    }
    
    async function createRoom() {
        const res = await api("createRoom", { roomName: `${currentPlayer.name}的房间`, playerId: currentPlayer.id });
        if (res.success) {
            currentRoom = res.room;
            currentPlayer.roomId = currentRoom.id;
            await resetRoomState();
            await refreshState();
        } else {
            alert("创建失败: " + (res.error || "未知错误"));
        }
    }
    
    async function joinRoom() {
        const code = document.getElementById("joinRoomCode").value.trim().toUpperCase();
        if (!code) return;
        const res = await api("joinRoom", { roomId: code, playerId: currentPlayer.id });
        if (res.success) {
            currentRoom = res.room;
            currentPlayer.roomId = currentRoom.id;
            await resetRoomState();
            await refreshState();
        } else {
            alert("加入失败: " + res.error);
        }
    }
    
    async function setReady() {
        const newReady = !currentPlayer.isReady;
        const res = await api("playerReady", { playerId: currentPlayer.id, isReady: newReady });
        if (res.success) {
            currentPlayer.isReady = newReady;
            await refreshState();
        }
    }
    
    async function startGame() {
        const res = await api("startGame", { roomId: currentRoom.id, playerId: currentPlayer.id });
        if (res.success) {
            currentRoom = res.room;
            gameActive = true;
            showPanel("game");
            renderGameUI();
            if (currentRoom.currentScene) {
                addLog(currentRoom.currentScene, "ai", false);
            }
            await refreshState();
        } else {
            alert("开始失败: " + res.error);
        }
    }
    
    function renderRoomUI() {
        if (!currentRoom) return;
        const isHost = currentRoom.hostId === currentPlayer.id;
        document.getElementById("roomInfo").innerHTML = `<div class="room-code">🏠 房间码: ${currentRoom.id}</div><div>状态: 等待中</div>`;
        fetch(`${WORKER_URL}/state`).then(r=>r.json()).then(data=>{
            const playersData = data.players;
            let html = "";
            for (let pid of currentRoom.players) {
                const p = playersData[pid];
                if (p) {
                    html += `<div class="player-card ${p.isReady ? 'ready' : ''} ${pid === currentRoom.hostId ? 'host' : ''}">${p.name} (${p.class}) ${p.isReady ? '✓' : '○'}</div>`;
                }
            }
            document.getElementById("roomPlayerList").innerHTML = html || "<div>等待玩家...</div>";
        });
        document.getElementById("roomActions").innerHTML = `<button id="readyBtn" style="margin-bottom: 8px;">${currentPlayer.isReady ? '取消准备' : '准备就绪'}</button>${isHost ? `<button id="startGameBtn">开始游戏</button>` : '<div class="info-text">等待房主开始...</div>'}`;
        document.getElementById("readyBtn")?.addEventListener("click", setReady);
        document.getElementById("startGameBtn")?.addEventListener("click", startGame);
    }
    
    function renderGameUI() {
        if (!currentRoom) return;
        const myTurn = (currentRoom.phase === "player" && currentRoom.players[currentRoom.currentTurnIndex] === currentPlayer.id);
        const canAct = myTurn && gameActive && !isActing;
        let turnText = "";
        if (currentRoom.phase === "player") {
            turnText = myTurn ? "🎲 轮到你了！" : "⏳ 等待其他玩家行动...";
        } else {
            turnText = "⚔️ 敌人回合...";
        }
        document.getElementById("turnIndicator").innerHTML = turnText;
        document.getElementById("sceneDesc").innerHTML = currentRoom.currentScene || "冒险继续...";
        const enemyDiv = document.getElementById("enemyContainer");
        if (currentRoom.enemies && currentRoom.enemies.length > 0) {
            enemyDiv.innerHTML = currentRoom.enemies.map(e => `<div class="enemy-card"><span>👾 ${e.name}</span><span>❤️ ${e.hp}/${e.maxHp}</span></div>`).join("");
        } else {
            enemyDiv.innerHTML = "";
        }
        document.getElementById("playerStats").innerHTML = `<strong>${currentPlayer.name}</strong> (${currentPlayer.class}) | ❤️ ${currentPlayer.hp}/${currentPlayer.maxHp} | 💙 MP ${currentPlayer.mp}/${currentPlayer.maxMp} | 💪${currentPlayer.attributes.str} 🏹${currentPlayer.attributes.dex} 🧠${currentPlayer.attributes.int} ❤️${currentPlayer.attributes.con}`;
        const actionInput = document.getElementById("actionInput");
        const actBtn = document.getElementById("actBtn");
        if (actionInput) actionInput.disabled = !canAct;
        if (actBtn) actBtn.disabled = !canAct;
    }
    
    async function takeAction() {
        if (isActing) { addLog("请等待...", "system", true); return; }
        if (!currentRoom || currentRoom.phase !== "player") { addLog("现在是敌人回合，请稍后", "system", true); return; }
        if (currentRoom.players[currentRoom.currentTurnIndex] !== currentPlayer.id) { addLog("还没轮到你", "system", true); return; }
        const actionText = document.getElementById("actionInput").value;
        if (!actionText) { addLog("请输入行动", "system", true); return; }
        
        // 添加玩家行动陈述
        const actionClientId = generateClientId();
        addLog(`🎯 ${currentPlayer.name} 行动：${actionText}`, "action", false, actionClientId);
        
        isActing = true;
        document.getElementById("actBtn").disabled = true;
        document.getElementById("actionInput").disabled = true;
        try {
            // 检查是否是战斗（如果存在敌人）
            let isCombat = false;
            let target = null;
            if (currentRoom.enemies && currentRoom.enemies.length > 0) {
                const lower = actionText.toLowerCase();
                if (lower.includes("攻击") || lower.includes("砍") || lower.includes("打") || lower.includes("射")) {
                    isCombat = true;
                    target = currentRoom.enemies[0];
                }
            }
            
            let newEnemies = currentRoom.enemies;
            if (isCombat && target) {
                // 战斗逻辑
                const dice = Math.floor(Math.random() * 20) + 1;
                const attackRoll = dice + currentPlayer.atkBonus;
                const isHit = attackRoll >= (target.ac || 11);
                let damage = 0;
                if (isHit) {
                    damage = Math.floor(Math.random() * currentPlayer.baseDmg) + 5;
                    target.hp -= damage;
                    if (target.hp < 0) target.hp = 0;
                }
                newEnemies = currentRoom.enemies.filter(e => e.hp > 0);
                addLog(`${currentPlayer.name} 掷出 ${dice}，${isHit ? "命中 " + damage + " 伤害" : "未命中"}`, "action", false);
                const hitResult = isHit ? "命中" : "未命中";
                const aiDesc = await generateBattleDescription(currentPlayer.name, currentPlayer.class, actionText, hitResult, damage);
                addLog(aiDesc, "ai", false);
                if (newEnemies.length === 0) {
                    addLog("🏆 战斗胜利！", "ai", false);
                }
            } else {
                // 非战斗：调用 AI 生成剧情
                const narrative = await generateNarrative(actionText);
                addLog(narrative, "ai", false);
                // 可选：根据剧情内容决定是否添加敌人等（暂不自动添加）
            }
            
            // 发送行动结果到服务器（更新敌人、切换回合）
            const actionRes = await api("playerAction", { roomId: currentRoom.id, playerId: currentPlayer.id, enemies: newEnemies });
            if (actionRes.success) {
                currentRoom = actionRes.room;
                if (actionRes.enemyActions && actionRes.enemyActions.length) {
                    for (let act of actionRes.enemyActions) {
                        addLog(act.description, "ai", false);
                    }
                }
                if (actionRes.players && actionRes.players[currentPlayer.id]) {
                    currentPlayer.hp = actionRes.players[currentPlayer.id].hp;
                }
                await refreshState();
            }
            document.getElementById("actionInput").value = "";
        } catch(e) {
            addLog("行动失败: " + e.message, "system", true);
        } finally {
            isActing = false;
            renderGameUI();
        }
    }
    
    async function generateBattleDescription(playerName, playerClass, actionDesc, hitResult, damage) {
        // 简化战斗描述，不用AI调用，直接返回
        if (hitResult === "命中") {
            return `${playerName} 的攻击狠狠击中敌人，造成 ${damage} 点伤害！`;
        } else {
            return `${playerName} 的攻击被敌人闪避。`;
        }
    }
    
    async function syncLoop() {
        try {
            if (!currentPlayer) return;
            const url = `${WORKER_URL}/state${currentPlayer.roomId ? `?roomId=${currentPlayer.roomId}` : ""}`;
            const res = await fetch(url);
            const data = await res.json();
            if (currentPlayer && data.players[currentPlayer.id]) {
                currentPlayer = data.players[currentPlayer.id];
                document.getElementById("playerNameDisplay").innerHTML = `${currentPlayer.name} (${currentPlayer.class})`;
            }
            if (currentPlayer && currentPlayer.roomId && data.rooms[currentPlayer.roomId]) {
                const newRoom = data.rooms[currentPlayer.roomId];
                if (JSON.stringify(currentRoom) !== JSON.stringify(newRoom)) {
                    currentRoom = newRoom;
                    if (currentRoom.status === "playing" && !gameActive) {
                        gameActive = true;
                        showPanel("game");
                        renderGameUI();
                    } else if (currentRoom.status === "waiting") {
                        renderRoomUI();
                    }
                } else if (currentRoom.status === "playing" && !gameActive) {
                    gameActive = true;
                    showPanel("game");
                    renderGameUI();
                } else if (gameActive) {
                    renderGameUI();
                }
            }
            if (data.messages && data.messages.length) {
                for (let msg of data.messages) {
                    if (msg.id > lastMessageId) {
                        lastMessageId = msg.id;
                        if (msg.clientId && !displayedMessageIds.has(msg.clientId)) {
                            addLog(msg.content, msg.type, true, msg.clientId);
                        } else if (!msg.clientId && !displayedMessageIds.has(msg.id)) {
                            addLog(msg.content, msg.type, true, msg.id);
                            displayedMessageIds.add(msg.id);
                        }
                    }
                }
            }
            document.getElementById("syncStatus").innerHTML = "🟢 已连接";
        } catch(e) {
            console.error(e);
            document.getElementById("syncStatus").innerHTML = "🔴 离线";
        }
    }
    
    document.getElementById("joinRoomBtn").onclick = joinRoom;
    document.getElementById("actBtn").onclick = takeAction;
    document.getElementById("actionInput").addEventListener("keypress", (e) => { if (e.key === "Enter" && !isActing) { e.preventDefault(); takeAction(); } });
    initAttributeControls();
    syncInterval = setInterval(syncLoop, 1000);
    showPanel("login");
    addLog("🎲 欢迎来到 AI 跑团！创建角色并分配属性点。", "system", true);
</script>
</body>
</html>
