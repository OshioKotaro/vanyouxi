<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI跑团 - 多人回合制</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #0a1a1c;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            padding: 1rem;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e2a2c;
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 1.5rem;
            margin: 0 0 1rem 0;
            text-align: center;
        }
        .status {
            background: #2a3a3c;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
        }
        .panel {
            background: #2a3a3c;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        input, select, button {
            width: 100%;
            padding: 0.7rem;
            margin: 0.3rem 0;
            border-radius: 2rem;
            border: none;
            background: #3a4a4c;
            color: white;
            font-size: 1rem;
        }
        button {
            background: #7a5a3a;
            cursor: pointer;
            font-weight: bold;
        }
        button:active {
            background: #9a7a5a;
        }
        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .player-card {
            background: #3a5a5c;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.9rem;
        }
        .ready {
            background: #2a7a3a;
            border: 1px solid #8bc34a;
        }
        .host {
            border: 1px solid gold;
        }
        .room-code {
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
            letter-spacing: 4px;
            background: #1a2a2c;
            padding: 0.5rem;
            border-radius: 1rem;
            margin: 0.5rem 0;
        }
        .enemy {
            background: #4a2a2a;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            margin: 0.5rem 0;
            display: flex;
            justify-content: space-between;
        }
        .log {
            background: #1a2a2c;
            border-radius: 1rem;
            height: 200px;
            overflow-y: auto;
            padding: 0.5rem;
            font-size: 0.8rem;
        }
        .log p {
            margin: 0.3rem 0;
            border-left: 2px solid #b89a6a;
            padding-left: 0.5rem;
        }
        .action-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .action-row input {
            flex: 3;
        }
        .action-row button {
            flex: 1;
        }
        .hidden {
            display: none;
        }
        .turn {
            background: #7a5a3a;
            text-align: center;
            padding: 0.5rem;
            border-radius: 2rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>⚔️ AI跑团 · 多人联机</h1>
    <div class="status">
        <span id="sync">🔄 连接中</span>
        <span id="player-name"></span>
    </div>

    <!-- 登录面板 -->
    <div id="login-panel" class="panel">
        <h3>创建角色</h3>
        <input type="text" id="char-name" placeholder="角色名" value="冒险者">
        <select id="char-class">
            <option value="战士">战士</option>
            <option value="法师">法师</option>
            <option value="游侠">游侠</option>
        </select>
        <button id="create-btn">开始冒险</button>
        <hr>
        <p style="font-size:0.8rem">已有角色？输入ID恢复</p>
        <input type="text" id="restore-id" placeholder="角色ID">
        <button id="restore-btn">恢复角色</button>
    </div>

    <!-- 房间面板 -->
    <div id="room-panel" class="panel hidden">
        <div id="room-header"></div>
        <div class="player-list" id="room-players"></div>
        <div id="room-actions"></div>
        <hr>
        <div style="display:flex; gap:0.5rem">
            <input type="text" id="join-code" placeholder="房间码">
            <button id="join-btn" style="width:auto">加入</button>
        </div>
    </div>

    <!-- 游戏面板 -->
    <div id="game-panel" class="panel hidden">
        <div id="turn-indicator" class="turn">等待开始</div>
        <div id="scene-desc"></div>
        <div id="enemies"></div>
        <div id="stats" style="background:#1a2a2c; border-radius:1rem; padding:0.5rem; margin:0.5rem 0"></div>
        <div class="log" id="log"></div>
        <div class="action-row" id="action-area">
            <input type="text" id="action-input" placeholder="描述你的行动...">
            <button id="act-btn">行动</button>
        </div>
    </div>
</div>

<script>
    const WORKER = "https://paotuan.xianzhi-hong.workers.dev";
    const GROQ_KEY = "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";  // 替换

    let currentPlayer = null;
    let currentRoom = null;
    let lastMessageCount = 0;
    let syncInterval = null;

    // 辅助：调用后端 API
    async function api(action, data) {
        try {
            const res = await fetch(`${WORKER}/action`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, data })
            });
            return await res.json();
        } catch (e) {
            console.error(e);
            return { success: false, error: e.message };
        }
    }

    // 获取全量状态
    async function fetchState() {
        const res = await fetch(`${WORKER}/state`);
        return await res.json();
    }

    // 添加本地日志
    function addLog(msg, type = "system") {
        const logDiv = document.getElementById("log");
        if (!logDiv) return;
        const p = document.createElement("p");
        p.innerHTML = msg;
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    // 刷新 UI：房间或游戏
    async function refreshUI() {
        if (!currentPlayer) return;
        const state = await fetchState();
        const players = state.players;
        const rooms = state.rooms;
        const messages = state.messages;

        // 更新玩家状态
        if (players[currentPlayer.id]) {
            currentPlayer = players[currentPlayer.id];
            document.getElementById("player-name").innerHTML = `${currentPlayer.name} (${currentPlayer.class})`;
        }

        // 更新房间
        if (currentPlayer.roomId && rooms[currentPlayer.roomId]) {
            currentRoom = rooms[currentPlayer.roomId];
        } else {
            currentRoom = null;
        }

        // 根据当前状态显示界面
        if (!currentRoom) {
            // 不在房间，显示房间面板，并允许创建
            document.getElementById("room-panel").classList.remove("hidden");
            document.getElementById("game-panel").classList.add("hidden");
            document.getElementById("room-header").innerHTML = `<div style="text-align:center">🏠 没有房间，创建一个吧</div>`;
            document.getElementById("room-players").innerHTML = "";
            document.getElementById("room-actions").innerHTML = `<button id="create-room-btn">➕ 创建新房间</button>`;
            document.getElementById("create-room-btn").onclick = async () => {
                const res = await api("createRoom", { playerId: currentPlayer.id });
                if (res.success) {
                    addLog(`房间创建成功！房间码: ${res.roomId}`, "system");
                    await refreshUI();
                } else {
                    alert("创建失败");
                }
            };
            return;
        }

        // 在房间内
        if (currentRoom.status === "waiting") {
            // 显示房间界面
            document.getElementById("room-panel").classList.remove("hidden");
            document.getElementById("game-panel").classList.add("hidden");
            // 房间信息
            document.getElementById("room-header").innerHTML = `
                <div class="room-code">🏠 房间码: ${currentRoom.id}</div>
                <div>状态: 等待中 (${currentRoom.players.length}/?)</div>
            `;
            // 玩家列表
            let playersHtml = "";
            for (let pid of currentRoom.players) {
                const p = players[pid];
                if (p) {
                    const readyClass = p.isReady ? "ready" : "";
                    const hostClass = pid === currentRoom.hostId ? "host" : "";
                    playersHtml += `<div class="player-card ${readyClass} ${hostClass}">${p.name} (${p.class}) ${p.isReady ? "✓" : ""}</div>`;
                }
            }
            document.getElementById("room-players").innerHTML = playersHtml;
            // 操作按钮
            const isHost = currentRoom.hostId === currentPlayer.id;
            const allReady = currentRoom.players.length > 0 && currentRoom.players.every(pid => players[pid]?.isReady);
            document.getElementById("room-actions").innerHTML = `
                <button id="ready-btn">${currentPlayer.isReady ? "取消准备" : "准备就绪"}</button>
                ${isHost ? `<button id="start-btn" ${!allReady ? "disabled" : ""}>开始游戏</button>` : '<div>等待房主开始...</div>'}
            `;
            document.getElementById("ready-btn").onclick = async () => {
                await api("setReady", { playerId: currentPlayer.id, isReady: !currentPlayer.isReady });
                await refreshUI();
            };
            if (isHost) {
                document.getElementById("start-btn").onclick = async () => {
                    // 可选：调用AI生成场景，但为了简化，直接使用默认场景
                    const res = await api("startGame", { roomId: currentRoom.id, playerId: currentPlayer.id });
                    if (res.success) {
                        addLog("游戏开始！", "system");
                        await refreshUI();
                    } else {
                        alert("开始失败: " + res.error);
                    }
                };
            }
        } else if (currentRoom.status === "playing") {
            // 游戏界面
            document.getElementById("room-panel").classList.add("hidden");
            document.getElementById("game-panel").classList.remove("hidden");
            const myTurn = currentRoom.turn === currentPlayer.id;
            document.getElementById("turn-indicator").innerHTML = myTurn ? "🎲 轮到你了！" : "⏳ 等待其他玩家行动...";
            document.getElementById("scene-desc").innerHTML = currentRoom.currentScene || "冒险中...";
            // 敌人
            const enemiesDiv = document.getElementById("enemies");
            if (currentRoom.enemies && currentRoom.enemies.length) {
                enemiesDiv.innerHTML = currentRoom.enemies.map(e => `<div class="enemy"><span>👾 ${e.name}</span><span>❤️ ${e.hp}/${e.maxHp}</span></div>`).join("");
            } else {
                enemiesDiv.innerHTML = "<div>✅ 胜利！</div>";
            }
            // 玩家状态
            document.getElementById("stats").innerHTML = `
                <strong>${currentPlayer.name}</strong> (${currentPlayer.class}) |
                ❤️ ${currentPlayer.hp}/${currentPlayer.maxHp} |
                💙 MP ${currentPlayer.mp}/${currentPlayer.maxMp}
            `;
            // 控制行动区域可见性
            const actionDiv = document.getElementById("action-area");
            if (myTurn && currentRoom.enemies && currentRoom.enemies.length > 0) {
                actionDiv.style.display = "flex";
            } else {
                actionDiv.style.display = "none";
            }
        }

        // 显示最新消息
        if (messages && messages.length > lastMessageCount) {
            for (let i = lastMessageCount; i < messages.length; i++) {
                const m = messages[i];
                if (m.type === "action") {
                    addLog(`⚔️ ${m.content}`, "action");
                } else {
                    addLog(`📢 ${m.content}`, "system");
                }
            }
            lastMessageCount = messages.length;
        }
    }

    // 执行玩家行动
    async function performAction() {
        if (!currentRoom || currentRoom.status !== "playing") {
            addLog("游戏未开始", "system");
            return;
        }
        if (currentRoom.turn !== currentPlayer.id) {
            addLog("现在不是你的回合", "system");
            return;
        }
        if (!currentRoom.enemies || currentRoom.enemies.length === 0) {
            addLog("没有敌人了", "system");
            return;
        }
        const actionText = document.getElementById("action-input").value.trim();
        if (!actionText) return;

        const btn = document.getElementById("act-btn");
        btn.disabled = true;
        btn.innerText = "行动中...";

        const res = await api("playerAction", {
            roomId: currentRoom.id,
            playerId: currentPlayer.id,
            actionText: actionText,
        });
        if (res.success) {
            // 显示 AI 叙事（如果有）
            if (res.aiText) {
                addLog(res.aiText, "action");
            }
            // 更新本地房间状态
            currentRoom = res.room;
            await refreshUI();
        } else {
            addLog("行动失败: " + (res.error || "未知错误"), "system");
        }
        btn.disabled = false;
        btn.innerText = "行动";
        document.getElementById("action-input").value = "";
    }

    // 创建角色
    document.getElementById("create-btn").onclick = async () => {
        const name = document.getElementById("char-name").value.trim();
        const cls = document.getElementById("char-class").value;
        if (!name) return;
        const res = await api("createPlayer", { name, class: cls });
        if (res.success) {
            currentPlayer = res.player;
            localStorage.setItem("playerId", currentPlayer.id);
            await refreshUI();
        } else {
            alert("创建失败");
        }
    };

    // 恢复角色
    document.getElementById("restore-btn").onclick = async () => {
        const id = document.getElementById("restore-id").value.trim();
        if (!id) return;
        const res = await api("getPlayer", { playerId: id });
        if (res.success && res.player) {
            currentPlayer = res.player;
            localStorage.setItem("playerId", currentPlayer.id);
            await refreshUI();
        } else {
            alert("角色不存在");
        }
    };

    // 加入房间
    document.getElementById("join-btn").onclick = async () => {
        const code = document.getElementById("join-code").value.trim().toUpperCase();
        if (!code) return;
        const res = await api("joinRoom", { roomId: code, playerId: currentPlayer.id });
        if (res.success) {
            await refreshUI();
        } else {
            alert("加入失败: " + (res.error || "房间不存在"));
        }
    };

    // 行动按钮
    document.getElementById("act-btn").onclick = performAction;
    document.getElementById("action-input").addEventListener("keypress", (e) => {
        if (e.key === "Enter") performAction();
    });

    // 同步循环
    async function syncLoop() {
        if (currentPlayer) {
            await refreshUI();
        }
        document.getElementById("sync").innerHTML = "🟢 在线";
        setTimeout(syncLoop, 2000);
    }

    // 启动
    const savedId = localStorage.getItem("playerId");
    if (savedId) {
        api("getPlayer", { playerId: savedId }).then(res => {
            if (res.success && res.player) {
                currentPlayer = res.player;
                refreshUI();
            } else {
                // 没有有效角色，显示登录界面
                document.getElementById("login-panel").classList.remove("hidden");
                document.getElementById("room-panel").classList.add("hidden");
                document.getElementById("game-panel").classList.add("hidden");
            }
        });
    } else {
        document.getElementById("login-panel").classList.remove("hidden");
        document.getElementById("room-panel").classList.add("hidden");
        document.getElementById("game-panel").classList.add("hidden");
    }
    syncLoop();
</script>
</body>
</html>
