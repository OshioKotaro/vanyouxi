<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🐉 AI跑团 · 多人实时版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f0e 0%, #1a1f1e 100%);
            font-family: -apple-system, 'Segoe UI', 'Georgia', monospace;
            color: #e8e2d4;
            padding: 12px;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 100%;
            background: rgba(0,0,0,0.6);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #c4a46e;
        }
        h1 {
            font-size: 1.6rem;
            font-family: 'Georgia', serif;
            border-left: 5px solid #e6b873;
            padding-left: 15px;
            margin-top: 0;
            margin-bottom: 15px;
        }
        .sync-status {
            font-size: 10px;
            text-align: right;
            margin-bottom: 8px;
        }
        .sync-online { color: #8bc34a; }
        .sync-offline { color: #ff8a7a; }
        .join-bar {
            background: #1f2a24;
            border-radius: 60px;
            padding: 12px 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-end;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        .field label { font-size: 11px; letter-spacing: 2px; color: #dbb86b; }
        input, select {
            background: #2c3b32;
            border: 1px solid #b48c48;
            padding: 10px 12px;
            border-radius: 40px;
            color: #f2e5c6;
            font-family: monospace;
            font-size: 14px;
        }
        button {
            background: #7e6236;
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: bold;
            color: #fff0d4;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #a47e42; }
        button:disabled { opacity: 0.5; }
        .game-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .scene-box, .log-box {
            background: #0e1815cc;
            border-radius: 20px;
            padding: 15px;
        }
        .enemy-card {
            background: #2a221ab3;
            margin: 10px 0;
            padding: 10px 15px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .combat-log {
            background: #030807;
            height: 350px;
            overflow-y: auto;
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
        }
        .combat-log p {
            margin: 8px 0;
            border-left: 3px solid #dba450;
            padding-left: 10px;
        }
        .ai-narration {
            color: #f7e6b0;
            font-style: italic;
            background: #1e2a1e30;
            padding: 5px;
            border-radius: 10px;
        }
        .other-narration {
            color: #a8d8ff;
            font-style: italic;
            background: #1a2a3e30;
            padding: 5px;
            border-radius: 10px;
        }
        .action-area {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        #actionInput {
            flex: 3;
            background: #1c2b25;
            border: 1px solid #c4a060;
            padding: 12px;
            border-radius: 60px;
            color: #f7efcf;
            font-size: 14px;
        }
        #actBtn {
            flex: 1;
            background: #9e6f3e;
            font-size: 16px;
        }
        .players-tag {
            margin-top: 12px;
            font-size: 12px;
            max-height: 80px;
            overflow-y: auto;
        }
        .badge {
            background: #2a3b2c;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            margin: 3px;
            font-size: 11px;
        }
        .badge.current { background: #7e6236; border: 1px solid gold; }
        .status-ok { color: #8bc34a; font-size: 11px; }
        .status-warning { color: #ffc107; font-size: 11px; }
        #sceneName { font-size: 1.3rem; font-weight: bold; }
        #sceneDesc { font-size: 13px; opacity: 0.8; margin: 5px 0; }
        hr { border-color: #5e6e45; margin: 10px 0; }
        .player-name { color: #e6b873; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>🐉 AI跑团 · 多人实时版</h1>
    <div class="sync-status" id="syncStatus">🔄 同步中...</div>
    <div id="apiStatus" style="text-align: right; font-size: 11px; margin-bottom: 8px;">🔍 检测中...</div>
    
    <div class="join-bar">
        <div class="field"><label>🧝 角色名</label><input type="text" id="playerName" value="冒险者"></div>
        <div class="field"><label>⚔️ 职业</label>
            <select id="playerClass">
                <option value="战士">🗡️ 战士</option>
                <option value="法师">🔮 法师</option>
                <option value="游侠">🏹 游侠</option>
            </select>
        </div>
        <button id="joinBtn">✨ 加入</button>
        <button id="statsBtn">📖 面板</button>
    </div>

    <div class="game-row">
        <div class="scene-box">
            <div id="sceneName">加载中...</div>
            <div id="sceneDesc"></div>
            <div id="enemyContainer"></div>
            <div id="playerStatsPanel" style="display: none; margin-top: 15px; background: #00000066; border-radius: 16px; padding: 10px;"></div>
            <div class="players-tag" id="playerListDiv">👥 在线冒险团：</div>
        </div>

        <div class="log-box">
            <div style="font-weight: bold;">📜 战斗记录（所有人可见）</div>
            <div id="combatLog" class="combat-log"></div>
            <div class="action-area">
                <input id="actionInput" placeholder="🔮 挥剑斩敌 / 火球术" autocomplete="off">
                <button id="actBtn">🎲 行动</button>
            </div>
        </div>
    </div>
</div>

<script>
    const WORKER_URL = "https://paotuan.xianzhi-hong.workers.dev";
    const GROQ_API_KEY = "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";  // ← 填你的Groq Key
    
    let gameWorld = {
        sceneName: "🕯️ 诅咒墓穴",
        sceneDesc: "石壁渗血，骷髅战士从棺椁中爬出。",
        enemies: [
            { id: "skull1", name: "💀 骷髅剑士", hp: 45, maxHp: 45, ac: 12 },
            { id: "skull2", name: "🏹 骷髅射手", hp: 32, maxHp: 32, ac: 11 }
        ]
    };
    
    let players = {};
    let currentPlayerId = null;
    let currentPlayer = null;
    let isActionLocked = false;
    let syncInterval = null;
    let lastMessageCount = 0;
    let displayedMessageIds = new Set();
    
    function addLog(msg, isAI = false, playerName = null, isOwn = true) {
        const logDiv = document.getElementById("combatLog");
        if (!logDiv) return;
        const p = document.createElement("p");
        if (isAI) {
            if (isOwn) {
                p.innerHTML = `🎭 <span class="ai-narration">✨ ${msg}</span>`;
            } else {
                p.innerHTML = `🎭 <span class="other-narration">📖 [${playerName}] ${msg}</span>`;
            }
        } else {
            p.innerHTML = `📢 ${msg}`;
        }
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
    
    function systemMsg(msg) { addLog(`[系统] ${msg}`, false); }
    function d20() { return Math.floor(Math.random() * 20) + 1; }
    function damageRoll(base) { return Math.floor(Math.random() * base) + 4; }
    
    function getClassAttrs(job) {
        if (job === "战士") return { hp: 110, maxHp: 110, mp: 20, atkBonus: 12, baseDmg: 10, skill: "破甲斩" };
        if (job === "法师") return { hp: 72, maxHp: 72, mp: 80, atkBonus: 6, baseDmg: 7, skill: "炎爆术" };
        if (job === "游侠") return { hp: 88, maxHp: 88, mp: 40, atkBonus: 10, baseDmg: 9, skill: "穿云箭" };
        return { hp: 85, maxHp: 85, mp: 35, atkBonus: 8, baseDmg: 8, skill: "攻击" };
    }
    
    function createPlayer(name, job) {
        const stats = getClassAttrs(job);
        const id = Date.now() + "-" + name + Math.random().toString(36).substr(2, 5);
        return {
            id, name, class: job,
            hp: stats.hp, maxHp: stats.maxHp,
            mp: stats.mp, maxMp: stats.mp,
            atkBonus: stats.atkBonus, baseDmg: stats.baseDmg,
            skillName: stats.skill,
            lastSeen: Date.now()
        };
    }
    
    async function syncToServer() {
        try {
            await fetch(`${WORKER_URL}/state`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "updateWorld",
                    world: gameWorld,
                    players: players
                })
            });
        } catch(err) { console.log("同步失败:", err); }
    }
    
    async function syncPlayerToServer() {
        if (!currentPlayer) return;
        try {
            await fetch(`${WORKER_URL}/state`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "updatePlayer",
                    playerId: currentPlayer.id,
                    playerData: currentPlayer
                })
            });
        } catch(err) { console.log("同步玩家失败:", err); }
    }
    
    async function addGlobalMessage(message, playerName) {
        try {
            await fetch(`${WORKER_URL}/state`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "addMessage",
                    playerName: playerName,
                    message: message
                })
            });
        } catch(err) { console.log("添加消息失败:", err); }
    }
    
    async function syncFromServer() {
        try {
            const response = await fetch(`${WORKER_URL}/state`, {
                method: "GET",
                headers: { "Content-Type": "application/json" }
            });
            
            if (response.ok) {
                const remote = await response.json();
                if (remote.world) gameWorld = remote.world;
                if (remote.players) players = remote.players;
                
                // 处理新消息
                if (remote.messages && remote.messages.length > 0) {
                    for (const msg of remote.messages) {
                        if (!displayedMessageIds.has(msg.id)) {
                            displayedMessageIds.add(msg.id);
                            const isOwn = (msg.player === currentPlayer?.name);
                            addLog(msg.content, true, msg.player, isOwn);
                        }
                    }
                }
                
                document.getElementById("syncStatus").innerHTML = "🟢 实时同步中";
                document.getElementById("syncStatus").className = "sync-online";
                renderUI();
                renderPlayers();
                
                if (currentPlayerId && players[currentPlayerId]) {
                    currentPlayer = players[currentPlayerId];
                    updateStatsPanel();
                }
            }
        } catch(err) {
            console.log("同步失败:", err);
            document.getElementById("syncStatus").innerHTML = "🔴 同步断开";
            document.getElementById("syncStatus").className = "sync-offline";
        }
    }
    
    function startAutoSync() {
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(syncFromServer, 1500);
    }
    
    function renderUI() {
        const sceneNameEl = document.getElementById("sceneName");
        const sceneDescEl = document.getElementById("sceneDesc");
        const enemyContainer = document.getElementById("enemyContainer");
        if (sceneNameEl) sceneNameEl.innerHTML = gameWorld.sceneName;
        if (sceneDescEl) sceneDescEl.innerHTML = gameWorld.sceneDesc;
        if (!enemyContainer) return;
        if (!gameWorld.enemies || gameWorld.enemies.length === 0) {
            enemyContainer.innerHTML = "<div style='background:#28523b; border-radius: 20px; padding:12px;'>✅ 魔物已被击退！</div>";
            return;
        }
        let html = "";
        gameWorld.enemies.forEach(e => {
            html += `<div class="enemy-card"><span>👾 ${e.name}</span><span>❤️ ${e.hp}/${e.maxHp}</span><progress value="${e.hp}" max="${e.maxHp}" style="width:80px;"></progress></div>`;
        });
        enemyContainer.innerHTML = html;
    }
    
    function renderPlayers() {
        const div = document.getElementById("playerListDiv");
        if (!div) return;
        let names = Object.values(players).map(p => {
            const isCurrent = currentPlayerId === p.id;
            return `<span class="badge ${isCurrent ? 'current' : ''}">${p.name}(${p.class}) ❤️${p.hp}</span>`;
        });
        if (names.length === 0) names = ["暂无旅伴"];
        div.innerHTML = `👥 在线冒险团 (${Object.keys(players).length}人)： ${names.join(' ')}`;
    }
    
    function updateStatsPanel() {
        if (!currentPlayer) return;
        const panel = document.getElementById("playerStatsPanel");
        if (!panel) return;
        panel.style.display = "block";
        panel.innerHTML = `<div><strong>${currentPlayer.name}</strong> (${currentPlayer.class})</div>
            <div>❤️ ${currentPlayer.hp}/${currentPlayer.maxHp}  |  💙 MP ${currentPlayer.mp}/${currentPlayer.maxMp}</div>
            <div>⚔️ 攻击 +${currentPlayer.atkBonus}  |  🗡️ ${currentPlayer.skillName}</div>`;
    }
    
    async function callAI(character, actionDesc, dice, hitResult, damage, targetName) {
        const prompt = `写一段30-50字的战斗描述，黑暗奇幻风格：${character.name}(${character.class}) 使用 ${actionDesc} 攻击 ${targetName}，掷出${dice}点，${hitResult}，造成${damage}点伤害。`;
        
        try {
            const response = await fetch(WORKER_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: "你是DND地下城主，擅长写简短的战斗描述。" },
                        { role: "user", content: prompt }
                    ]
                })
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            
            if (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) {
                return data.choices[0].message.content.trim();
            }
            throw new Error("响应格式异常");
        } catch(err) {
            console.error("AI错误:", err);
            if (hitResult.includes("命中")) {
                return `⚔️ ${character.name} 的${actionDesc}狠狠击中${targetName}，造成${damage}点伤害！`;
            } else {
                return `🍃 ${character.name} 的${actionDesc}被${targetName}灵巧闪避。`;
            }
        }
    }
    
    async function takeAction() {
        if (isActionLocked) { systemMsg("请等待..."); return; }
        if (!currentPlayer) { systemMsg("请先加入游戏"); return; }
        if (currentPlayer.hp <= 0) { systemMsg("你已经倒下"); return; }
        if (!gameWorld.enemies || gameWorld.enemies.length === 0) { systemMsg("没有敌人了"); return; }
        
        const actionText = document.getElementById("actionInput").value;
        if (!actionText) return;
        
        isActionLocked = true;
        const btn = document.getElementById("actBtn");
        btn.textContent = "⏳ AI中...";
        btn.disabled = true;
        
        try {
            const target = gameWorld.enemies[0];
            const dice = d20();
            const attackRoll = dice + currentPlayer.atkBonus;
            const targetAC = target.ac || 11;
            const isHit = attackRoll >= targetAC;
            
            let damage = 0;
            if (isHit) {
                damage = damageRoll(currentPlayer.baseDmg) + Math.floor(currentPlayer.atkBonus / 3);
                damage = Math.max(2, damage);
                target.hp -= damage;
            }
            
            gameWorld.enemies = gameWorld.enemies.filter(e => e.hp > 0);
            
            if (isHit && damage > 0) {
                currentPlayer.hp -= 5;
                if (currentPlayer.hp < 0) currentPlayer.hp = 0;
            }
            
            players[currentPlayer.id] = currentPlayer;
            
            const aiText = await callAI(currentPlayer, actionText, dice, isHit ? "命中" : "未命中", damage, target.name);
            const fullMessage = `${aiText}`;
            
            // 添加到本地日志
            addLog(`🎲 ${currentPlayer.name} 掷出${dice}+${currentPlayer.atkBonus}=${attackRoll} vs AC${targetAC} → ${isHit ? "命中" : "未命中"} 伤害${damage}`, false);
            addLog(fullMessage, true, currentPlayer.name, true);
            
            // 同步到服务器，让其他玩家看到
            await addGlobalMessage(fullMessage, currentPlayer.name);
            await syncToServer();
            await syncPlayerToServer();
            
            renderUI();
            updateStatsPanel();
            renderPlayers();
            
            if (gameWorld.enemies.length === 0) {
                const victoryMsg = "🏆 战斗胜利！所有玩家共享这份荣耀！";
                addLog(victoryMsg, true);
                await addGlobalMessage(victoryMsg, "系统");
            }
            
            if (currentPlayer.hp <= 0) {
                systemMsg(`💀 ${currentPlayer.name} 战死...`);
                delete players[currentPlayer.id];
                currentPlayer = null;
                currentPlayerId = null;
                document.getElementById("playerStatsPanel").style.display = "none";
                await syncToServer();
                renderPlayers();
            }
            
        } finally {
            isActionLocked = false;
            btn.textContent = "🎲 行动";
            btn.disabled = false;
            document.getElementById("actionInput").value = "";
        }
    }
    
    async function joinGame() {
        let name = document.getElementById("playerName").value.trim();
        if (!name) name = "冒险者";
        const job = document.getElementById("playerClass").value;
        const newP = createPlayer(name, job);
        currentPlayerId = newP.id;
        currentPlayer = newP;
        players[newP.id] = newP;
        
        await syncPlayerToServer();
        await syncToServer();
        
        updateStatsPanel();
        renderPlayers();
        systemMsg(`${newP.name} 加入了冒险团！`);
        await addGlobalMessage(`✨ ${newP.name} 从迷雾中走来，加入了冒险团！`, "系统");
    }
    
    function toggleStats() {
        const panel = document.getElementById("playerStatsPanel");
        if (currentPlayer) panel.style.display = panel.style.display === "none" ? "block" : "none";
    }
    
    async function testWorker() {
        const statusDiv = document.getElementById("apiStatus");
        statusDiv.innerHTML = "🔄 测试连接...";
        try {
            const response = await fetch(`${WORKER_URL}/state`, { method: "GET" });
            if (response.ok) {
                statusDiv.innerHTML = "✅ 多人模式已启用，实时同步中";
                statusDiv.className = "status-ok";
            } else {
                statusDiv.innerHTML = "⚠️ Worker连接异常";
                statusDiv.className = "status-warning";
            }
        } catch(err) {
            statusDiv.innerHTML = "⚠️ 连接中...";
            statusDiv.className = "status-warning";
        }
    }
    
    document.getElementById("joinBtn").onclick = joinGame;
    document.getElementById("statsBtn").onclick = toggleStats;
    document.getElementById("actBtn").onclick = takeAction;
    document.getElementById("actionInput").addEventListener("keypress", (e) => { if(e.key === "Enter") takeAction(); });
    
    startAutoSync();
    testWorker();
    addLog("🔥 多人实时模式已启动！所有人的战斗记录都会显示在这里！", true);
</script>
</body>
</html>
